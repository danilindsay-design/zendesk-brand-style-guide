<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zendesk Brand Style Guide</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('fonts/zendesk-sans/ZendeskSans-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('fonts/zendesk-sans/ZendeskSans-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Zendesk Mono';
            src: url('fonts/zendesk-mono/ZendeskMono-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Zendesk Sans', sans-serif;
            background: linear-gradient(135deg, #11110D 0%, #203524 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            text-align: center;
        }

        .supertitle {
            font-family: 'Zendesk Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.48px;
            text-transform: uppercase;
            color: #D1F470;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 72px;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 56px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 16px;
            font-family: 'Zendesk Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn-primary {
            background-color: #D1F470;
            color: #11110D;
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #FFFFFF;
            color: #11110D;
            border: 2px solid #FFFFFF;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 80px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 48px;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="supertitle">ZENDESK BRAND SYSTEM</p>
        <h1>Brand style guide</h1>
        <p class="subtitle">Zendesk's AI friendly digital design and development library</p>

        <div class="buttons">
            <a href="zendesk-brand-visual-reference.html" class="btn btn-primary">Human Reference</a>
            <a href="zendesk-brand-code-reference.html" class="btn btn-secondary">Machine Reference</a>
        </div>

        <div class="footer">
            <p>Zendesk Brand For Claude Code | v2026</p>
        </div>
    </div>
</body>
</html>
